variables:
    GIT_DEPTH: 1

stages:
  - test

clone_other_project:
  stage: test
  tags:
    - "avengers-dev-spot-s"
  image: all-docker.artifact.cloud.socrate.vsct.fr/docker:stable
  before_script:
    - apk add --no-cache git
  script:
